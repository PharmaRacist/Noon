# Moving Windows
bind = Super+Ctrl, Right,  layoutmsg, movewindowto r
bind = Super+Ctrl, Left,   layoutmsg, movewindowto l
bind = Super+Ctrl, Up,     layoutmsg, movewindowto u
bind = Super+Ctrl, Down,   layoutmsg, movewindowto d

bind = Super+Ctrl, Right,  movewindow, r
bind = Super+Ctrl, Left,   movewindow, l
bind = Super+Ctrl, Up,     movewindow, u
bind = Super+Ctrl, Down,   movewindow, d

# Mouse
bindm = Super, mouse:272,  movewindow
bindm = Super, mouse:274,  movewindow
bindm = Super, mouse:273,  resizewindow

# Window State Management
bind = Super+Ctrl, D,       fullscreenstate, 1
bind = Super, D,           layoutmsg, colresize 1
bind = Super, F,           fullscreen, 0
bind = Super+Alt, F,       fullscreenstate, 0 3

# Focus Management
## Directions way
bind = Super, Right,       layoutmsg, move +col
bind = Super, Left,        layoutmsg, move -col
bind = Super, Up,          movefocus, u
bind = Super, Down,        movefocus, d
## Brackets way
bind = Super, BracketRight, layoutmsg, move +col
bind = Super, BracketLeft,  layoutmsg, move -col

# Fine pixel scroll
bind = Super+Alt, Right,   layoutmsg, move +200
bind = Super+Alt, Left,    layoutmsg, move -200

# Promote window to its own column
# NOTE: conflicts with old `pin` — remove pin or rebind to e.g. Super+Shift+P
bind = Super, P,           layoutmsg, promote

# Swap columns
# NOTE: same keys as Moving Windows above — remove one if unintentional
bind = Super+Ctrl, Right,  layoutmsg, swapcol r
bind = Super+Ctrl, Left,   layoutmsg, swapcol l

# Column Resizing
bind = Super+Shift, Right, layoutmsg, colresize +conf
bind = Super+Shift, Left,  layoutmsg, colresize -conf
bind = Super+Shift, Up,    layoutmsg, colresize +0.1
bind = Super+Shift, Down,  layoutmsg, colresize -0.1
bind = Super+Ctrl+Alt, equal, layoutmsg, colresize all 0.5

# Fit / Scroll to position
bind = Super, Home,        layoutmsg, fit tobeg
bind = Super, End,         layoutmsg, fit toend
bind = Super, A,           layoutmsg, fit active
bind = Super+Shift, A,     layoutmsg, fit all
bind = Super+Ctrl, A,      layoutmsg, fit visible

# Move entire column to workspace
bind = Super+Alt, 1,       layoutmsg, movecoltoworkspace 1
bind = Super+Alt, 2,       layoutmsg, movecoltoworkspace 2
bind = Super+Alt, 3,       layoutmsg, movecoltoworkspace 3
bind = Super+Alt, 4,       layoutmsg, movecoltoworkspace 4
bind = Super+Alt, 5,       layoutmsg, movecoltoworkspace 5
bind = Super+Alt, 6,       layoutmsg, movecoltoworkspace 6
bind = Super+Alt, 7,       layoutmsg, movecoltoworkspace 7
bind = Super+Alt, 8,       layoutmsg, movecoltoworkspace 8
bind = Super+Alt, 9,       layoutmsg, movecoltoworkspace 9
bind = Super+Alt, 0,       layoutmsg, movecoltoworkspace 10
bind = Super+Shift+Ctrl, Right, layoutmsg, movecoltoworkspace +1
bind = Super+Shift+Ctrl, Left,  layoutmsg, movecoltoworkspace -1
bind = Super+Alt, S,       layoutmsg, movecoltoworkspace special

# Gestures
gesture = 3, Right, dispatcher, layoutmsg, move -col
gesture = 3, Left,  dispatcher, layoutmsg, move +col
gesture = 3, Right, mod:Super+Shift, dispatcher, layoutmsg, colresize +conf
gesture = 3, Left,  mod:Super+Shift, dispatcher, layoutmsg, colresize -conf
