#!
##! Noon
bindl = Super, Super_L, exec,  $ipc noon toggle_beam # Toggle Beam
bind = Super, Tab, exec, $ipc sidebar reveal "View" # toggle_expose
bind = Super, L, exec, $ipc global lock # Toggle Lock Screen
bind = Super Shift, R, exec, $ipc global pick_random_wall # Random Wall
bind = Super+Ctrl, Period, exec, wl-paste -p | xargs -0 $ipc noon translate # Translate Highlighted text
bind = SUPER Ctrl, X, exec, $ipc noon toggle_bar_mode # Switch Bar Mode
bind = Super Alt, X, exec, $ipc noon swap_bar_position # Swap Bar Position
bind = Ctrl Alt, P, exec, $ipc noon toggle_dock_pin # Toggle Dock Pinning

##! XP
bindn = Super, R, exec, $ipc xp toggle_run # toggle Run
bindl = Super, Super_L, exec,  $ipc xp toggle_start_menu # Start Menu

##! Nobuntu
bindl = Super, Super_L, exec, $ipc nobuntu toggle_overview # Show Overview
bindl = Super, N, exec, $ipc nobuntu toggle_notifs # Toggle Notifications Panel
bindl = Super, comma, exec, $ipc nobuntu toggle_db # Toggle Control Center
bindl = Super, V, exec, $ipc nobuntu toggle_clipboard # Toggle Clipboard

##! Media Controls
bind = , XF86AudioPlay, exec, $ipc global toggle_playing # Toggle Playing State
bind = , XF86AudioPrev, exec, $ipc global previous_track || playerctl previous # Previous Track
bind = , XF86AudioNext, exec, $ipc global next_track || playerctl next || playerctl position `bc <<< "100 * $(playerctl metadata mpris:length) / 1000000 / 100"`# Next Track
bind = , XF86AudioPause, exec, $ipc global pause_all_players # Pause all Players
bindle = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 2%+ # Volume Up
bindle = , XF86AudioLowerVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 2%- # Volume Down
bindle = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_SINK@ toggle # Mute
bindld = Super+Shift+Alt, M, Toggle mic, exec, wpctl set-mute @DEFAULT_SOURCE@ toggle # Toggle Mic

##! Brightness Controls
bindle = , XF86MonBrightnessUp, exec, $ipc global inc_brightness || brightnessctl set +5% # Increase Brightness
bindle = , XF86MonBrightnessDown, exec, $ipc global dec_brightness || brightnessctl set 5%- # Decrease Brightness

#!
##! Sidebar Binds
bindl = Ctrl Alt, X, exec, $ipc sidebar reveal "Bars" # Reveal Bar Switcher
bindl = Super, W, exec, $ipc sidebar reveal "Walls" # Reveal Wallpaper Selector
bindl = Super Alt, W, exec, $ipc sidebar reveal "Web" # Reveal Web browser
bindl = Super CTRL, N, exec, $ipc sidebar reveal "Notes" # Reveal Notes
bindl = Super CTRL, G, exec, $ipc sidebar reveal "Games" # Reveal Games Launcher
bindl = Super Shift, Tab, exec, $ipc sidebar reveal "View" # Reveal Windows Manager
bindl = Super, J, exec, $ipc sidebar reveal "Downloads" # Reveal Downloads Manager
bindl = Super, M, exec, $ipc sidebar reveal "Beats" # Reveal Beats
bindl = Super Ctrl, T, exec, $ipc sidebar reveal "Tasks" # Reveal Todo list
bindl = Super Alt, B, exec, $ipc sidebar reveal "Bookmarks" # Reveal Bookmarks
bindl = Super, A, exec, $ipc sidebar reveal "API" # Reveal APIs
bindl = Super, grave, exec, $ipc sidebar reveal "Sounds" # Reveal Sounds Panel
bindl = Super, Escape, exec, $ipc sidebar reveal "Widgets" # Reveal Widgets Panel
bindl = Super, Z, exec, $ipc sidebar reveal "Shelf" # Reveal Shelf
bindl = Super Shift, X, exec, $ipc sidebar reveal "Tweaks" # Reveal Quick Tweaks
bindl = Super, N, exec, $ipc sidebar reveal "Notifs" # Reveal Notifications Panel
bindl = Super, Space, exec, $ipc sidebar reveal "Apps" || pkill fuzzel || fuzzel  # Reveal APP Drawer
bindl = Ctrl Alt, delete, exec, $ipc sidebar reveal "Session" || pkill wlogout || wlogout -p layer-shell # Reveal Session Board
bindl = Super, V, exec, $ipc sidebar reveal "History" # Reveal Clipboard
bindl = Super Shift, Period, exec, $ipc sidebar reveal "Emojis" || pkill fuzzel || ~/.config/noon/scripts/emoji_service.sh copy  # Reveal Emojis

##! Sidebar Split
bindl = Super+Shift, W, exec, $ipc sidebar reveal_aux "Walls"  # Reveal Wallpaper Switcher
bindl = Super+Shift CTRL, N, exec, $ipc sidebar reveal_aux "Notes" # Reveal Notes
bindl = Super+Shift, M, exec, $ipc sidebar reveal_aux "Beats" # Reveal Beats
bindl = Super+Shift Ctrl, T, exec, $ipc sidebar reveal_aux "Tasks" # Reveal Todo list
bindl = Super+Shift, A, exec, $ipc sidebar reveal_aux "API" # Reveal APIs
bindl = Super+Shift, I, exec, $ipc sidebar reveal_aux "Tweaks" # Quick Tweaks
bindl = Super+Shift, V, exec, $ipc sidebar reveal_aux "History" # Clipboard

##! Global
bind = Ctrl+Super, R, exec, $scriptsDir/reload_shell.sh # RESTART SHELL
bindn = Super+Alt, M, exec, $ipc apps media # Apps: Media
bindn = Super, I, exec, $ipc apps settings # Apps: Settings
bindn = Super Alt, D, exec, $ipc global toggle_dormant_state # DELOAD | GAME MODE
bind = Super Shift, L, exec, systemctl restart sddm # Restart SDDM
bind = , Super_L, global, noon:superHeld # [hidden]
bindl = Super Alt, G, exec, $ipc sidebar reveal "DMenu" # [hidden]
